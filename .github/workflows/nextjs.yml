name: Next.js CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-build:
    name: Lint and build (production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build for production
        run: npm run build
