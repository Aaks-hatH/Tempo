<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#000"/>
  <!--
    Italic hash matching the Hash Browns logo.
    Vertical bars lean right (italic). Horizontal bars angle slightly upward.
    All bars have angled/sheared ends for the dynamic cut look.
  -->

  <!-- Left vertical bar — italic, sheared top & bottom -->
  <polygon points="31,10  43,10  39,90  27,90" fill="#1a5fff"/>

  <!-- Right vertical bar — italic, sheared top & bottom -->
  <polygon points="57,10  69,10  65,90  53,90" fill="#1a5fff"/>

  <!-- Top horizontal bar — slightly angled up to the right, sheared ends -->
  <polygon points="14,39  86,33  86,45  14,51" fill="#1a5fff"/>

  <!-- Bottom horizontal bar — slightly angled up to the right, sheared ends -->
  <polygon points="14,60  86,54  86,66  14,72" fill="#1a5fff"/>
</svg>
